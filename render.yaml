# Hivemind — Render Blueprint
# Deploys on Render's free tier with GitHub-backed persistent storage.
# Data survives every restart by auto-backing up to a private GitHub repo.

services:
  - type: web
    name: hivemind
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # === Persistence via GitHub (no Turso/external DB needed!) ===
      # The app auto-backs up SQLite to a private GitHub repo every 5 minutes
      # and restores on startup. Set both of these from Render dashboard.
      - key: GITHUB_TOKEN
        sync: false        # Personal access token with 'repo' scope
      - key: GITHUB_BACKUP_REPO
        sync: false        # e.g. "yourname/hivemind-backups" (created auto)
      - key: BACKUP_INTERVAL_SEC
        value: "300"       # 5 minutes
      # Self-ping to prevent free-tier 15-min idle sleep
      - key: PUBLIC_URL
        fromService:
          type: web
          name: hivemind
          property: host
      # === Alternative: Use Turso cloud DB instead (uncomment if preferred) ===
      # - key: TURSO_URL
      #   sync: false
      # - key: TURSO_AUTH_TOKEN
      #   sync: false
